name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Track the latest stable Go (org convention). go.mod floor is 1.26.4.
jobs:
  # Build, vet, race-test, and enforce 100% coverage. The differential-vs-gem
  # oracle test skips itself on Windows and where the `typhoeus` gem is absent;
  # ruby + the typhoeus gem are installed on the ubuntu/macos lanes so the MRI
  # (Ethon/libcurl) escape oracle runs there. The deterministic, ruby-free tests
  # alone keep coverage at 100% so the no-ruby lanes still pass the gate. No test
  # reaches the public network: the transport is a host seam, stubbed in every
  # test, with only localhost httptest servers for the net/http integration path.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - if: runner.os != 'Windows'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
      # typhoeus loads libcurl via Ethon/FFI at runtime; it is present on the
      # ubuntu/macos runners. Install is best-effort — the oracle skips if absent.
      - if: runner.os != 'Windows'
        run: gem install typhoeus --no-document || true
      - run: go version
      - run: go vet ./...
      - run: go build ./...
      - name: Test + 100% coverage gate
        shell: bash
        run: |
          COVERPKG=$(go list ./... | paste -sd, -)
          go test -race -coverpkg="$COVERPKG" -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -n 30
          cov=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "coverage: ${cov}%"
          awk -v t="$cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::coverage ${cov}% < 100%"; exit 1; }

  # Validate the library on the six supported 64-bit targets. amd64/arm64 run
  # natively; the rest run the suite under qemu-user (with a generous -timeout for
  # the emulator). The oracle test skips under qemu (no target-arch ruby/gem), so
  # this checks the deterministic core itself. Arch lanes run CGO=0.
  arch-native:
    name: arch ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: amd64 }
          - { os: ubuntu-24.04-arm, label: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go env GOARCH && CGO_ENABLED=0 go test ./...

  arch-qemu:
    name: arch ${{ matrix.goarch }} (qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goarch: riscv64, qemu: qemu-riscv64-static }
          - { goarch: loong64, qemu: qemu-loongarch64-static }
          - { goarch: ppc64le, qemu: qemu-ppc64le-static }
          - { goarch: s390x,   qemu: qemu-s390x-static }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - name: Test under qemu (${{ matrix.goarch }})
        run: CGO_ENABLED=0 GOARCH=${{ matrix.goarch }} go test -timeout 20m -exec=${{ matrix.qemu }} ./...

  wasm:
    name: wasm (${{ matrix.goos }}/wasm)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [js, wasip1]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build ${{ matrix.goos }}/wasm
        run: GOOS=${{ matrix.goos }} GOARCH=wasm go build ./...
